<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourHub - Login</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>

    </style>
</head>

<body>
  <a href="home.html" class="back-home">
    <i class="fas fa-arrow-left"></i>
    Back to Home
  </a>

  <div class="auth-container">

    <div class="auth-left">
      <h1>Welcome Back</h1>
      <p>Login to continue your travel journey with TourHub.</p>

      <div class="features">
        <div class="feature">
          <i class="fas fa-bookmark"></i>
          <span>Access saved favorites</span>
        </div>
        <div class="feature">
          <i class="fas fa-suitcase"></i>
          <span>Manage your bookings</span>
        </div>
        <div class="feature">
          <i class="fas fa-headset"></i>
          <span>24/7 customer support</span>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="logo-section">
        <i class="fas fa-globe-americas"></i>
        <h2>TourHub</h2>
      </div>

      <div class="auth-form">
        <h3>Login</h3>
        <p>Enter your credentials to continue</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm">

          <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="email" placeholder="you@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" placeholder="Enter password" required>
            </div>
          </div>

          <button type="submit" class="auth-btn">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <div class="login-link">
          Don’t have an account?
          <a href="register.html">Create one</a>
        </div>
      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>


</html>
