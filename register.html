<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TourHub - Register</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style></style>
</head>

<body>
  <a href="home.html" class="back-home">
    <i class="fas fa-arrow-left"></i>
    Back to Home
  </a>

  <div class="auth-container">

    <div class="auth-left">
      <h1>Start Your Journey</h1>
      <p>Create an account and unlock the best travel experiences worldwide.</p>

      <div class="features">
        <div class="feature">
          <i class="fas fa-bookmark"></i>
          <span>Save your favorite tours</span>
        </div>
        <div class="feature">
          <i class="fas fa-calendar-check"></i>
          <span>Easy booking & management</span>
        </div>
        <div class="feature">
          <i class="fas fa-headset"></i>
          <span>24/7 travel support</span>
        </div>
      </div>
    </div>

    <div class="auth-right">
      <div class="logo-section">
        <i class="fas fa-globe-americas"></i>
        <h2>TourHub</h2>
      </div>

      <div class="auth-form">
        <h3>Create Account</h3>
        <p>Join TourHub and start exploring the world</p>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="registerForm">

          <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
              <i class="fas fa-user"></i>
              <input type="text" id="fullName" placeholder="John Doe" required>
            </div>
          </div>

          <div class="form-group">
            <label>Email</label>
            <div class="input-wrapper">
              <i class="fas fa-envelope"></i>
              <input type="email" id="email" placeholder="you@email.com" required>
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="password" placeholder="Create password" required>
            </div>
            <div class="password-strength">
              <div class="password-strength-bar" id="strengthBar"></div>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-wrapper">
              <i class="fas fa-lock"></i>
              <input type="password" id="confirmPassword" placeholder="Repeat password" required>
            </div>
          </div>

          <button type="submit" class="auth-btn">
            <i class="fas fa-user-plus"></i> Create Account
          </button>
        </form>

        <div class="login-link">
          Already have an account? <a href="login.html">Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>


</html>
